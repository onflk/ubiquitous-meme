<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Film Vault</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080f0a;--surface:#0e1a11;--card:#111a13;
  --border:rgba(74,180,100,0.12);--green:#4ab464;
  --glow:rgba(74,180,100,0.25);--dim:rgba(74,180,100,0.5);
  --text:#e8f0e9;--muted:rgba(232,240,233,0.45);--faint:rgba(232,240,233,0.2);
  --nav:#0b1610;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:68px}
::-webkit-scrollbar{width:4px;height:0}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(74,180,100,.2);border-radius:2px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes expandIn{from{opacity:0;transform:scaleY(.85)}to{opacity:1;transform:scaleY(1)}}
@keyframes rotate{to{transform:rotate(360deg)}}

/* screens */
.screen{display:none}.screen.active{display:block}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:1.1rem}
@media(max-width:560px){.grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.75rem}}

/* bottom nav */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--nav);border-top:1px solid var(--border);display:flex;backdrop-filter:blur(20px)}
.nav-btn{flex:1;background:none;border:none;padding:.7rem .5rem .8rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.22rem;color:var(--faint);transition:color .2s;font-family:'DM Sans',sans-serif}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:1.15rem;transition:font-size .2s}
.nav-btn.active .nav-icon{font-size:1.3rem;filter:drop-shadow(0 0 6px var(--green))}
.nav-label{font-size:.62rem;font-weight:500;letter-spacing:.02em}
.nav-btn.active .nav-label{font-weight:700}
.nav-dot{width:18px;height:2px;background:var(--green);border-radius:1px;margin-top:1px;display:none}
.nav-btn.active .nav-dot{display:block}

/* hero */
.hero{position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.2}
.hero-fallback{width:100%;height:100%;background:radial-gradient(ellipse at 30% 50%,rgba(74,180,100,.08) 0%,transparent 70%),linear-gradient(135deg,#0b1a0d,#080f0a)}
.hero-overlay{position:absolute;inset:0}
.hero-content{position:absolute;bottom:1.8rem;left:2rem;right:2rem;z-index:5}
.hero-tag{font-size:.65rem;letter-spacing:.18em;color:var(--dim);margin-bottom:.4rem;font-weight:600}
.hero-title{font-weight:800;color:var(--text);line-height:1.1;font-size:clamp(1.5rem,5vw,2.4rem);max-width:480px}
.hero-actions{display:flex;align-items:center;gap:.8rem;margin-top:.65rem;flex-wrap:wrap}
.topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:1.4rem 2rem}
.logo{display:flex;align-items:center;gap:.55rem;font-size:1.25rem;font-weight:800;color:var(--green)}

/* buttons */
.btn-green{background:var(--green);color:#000;border:none;padding:.45rem 1rem;border-radius:6px;cursor:pointer;font-weight:700;font-size:.8rem;font-family:'DM Sans',sans-serif}
.btn-outline{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--muted);padding:.45rem .9rem;border-radius:6px;cursor:pointer;font-weight:600;font-size:.8rem;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-outline.saved{background:rgba(74,180,100,.15);border-color:rgba(74,180,100,.4);color:var(--green)}
.btn-icon{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);color:var(--muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center}

/* cards */
.card{cursor:pointer;border-radius:8px;overflow:hidden;background:var(--card);border:1px solid var(--border);transition:all .22s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 12px rgba(0,0,0,.4);position:relative}
.card:hover{transform:translateY(-4px) scale(1.01);border-color:rgba(74,180,100,.2);box-shadow:0 10px 30px rgba(0,0,0,.5)}
.card.selected{border-color:rgba(74,180,100,.4)!important;box-shadow:0 0 0 2px var(--green),0 8px 30px rgba(0,0,0,.6)!important;transform:none!important}
.card-poster{padding-top:140%;position:relative}
.card-poster img,.card-poster .ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.card-info{padding:.6rem .55rem .7rem}
.card-meta{font-size:.68rem;color:var(--faint);margin-bottom:.18rem}
.card-title{font-size:.82rem;color:var(--text);font-weight:600;line-height:1.25;margin-bottom:.28rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-btn{position:absolute;top:.5rem;right:.5rem;background:rgba(8,15,10,.75);border:1px solid rgba(255,255,255,.15);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:0}
.card:hover .wl-btn,.wl-btn.saved{opacity:1}
.wl-btn.saved{background:var(--green);border-color:var(--green);color:#000}

/* placeholder */
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.ph-glow{position:absolute;inset:0;background:radial-gradient(circle at 40% 60%,var(--glow) 0%,transparent 65%)}
.ph-init{color:var(--dim);font-weight:800;font-size:1.8rem}
.ph-name{font-size:.55rem;color:var(--faint);margin-top:.4rem;text-align:center;padding:0 .5rem}

/* stars */
.stars{font-size:.72rem;color:var(--green)}
.stars-n{font-size:.68rem;color:var(--muted);margin-left:.35rem}

/* section label */
.sec-label{font-size:.65rem;letter-spacing:.16em;color:var(--faint);margin-bottom:1rem;font-weight:600}

/* search */
.search-wrap{position:relative}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--faint);font-size:.8rem;pointer-events:none}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.65rem 2rem .65rem 2.1rem;border-radius:8px;font-size:.88rem;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s}
.search-input:focus{border-color:rgba(74,180,100,.35)}
.search-spin{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);color:var(--green);animation:rotate .8s linear infinite;display:none}
.search-spin.on{display:block}
.search-dd{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:300;background:var(--surface);border:1px solid rgba(74,180,100,.2);border-radius:10px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.7);display:none;max-height:420px;overflow-y:auto}
.search-dd.open{display:block;animation:fadeIn .15s ease}
.dd-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .85rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.dd-item:last-child{border-bottom:none}
.dd-item:hover{background:rgba(74,180,100,.08)}
.dd-thumb{width:38px;height:54px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--card)}
.dd-thumb-ph{display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:.9rem;font-weight:800}
.dd-info{flex:1;min-width:0}
.dd-title{font-size:.82rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-meta{font-size:.68rem;color:var(--muted);margin-top:.1rem}
.dd-btn{background:var(--green);color:#000;border:none;padding:.25rem .65rem;border-radius:4px;font-size:.68rem;font-weight:700;cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif}
.dd-empty{padding:1.2rem;text-align:center;color:var(--faint);font-size:.8rem}

/* show modal */
.modal-overlay{position:fixed;inset:0;background:rgba(2,6,3,.95);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(12px);animation:fadeIn .2s ease;overflow-y:auto}
.modal-box{background:var(--surface);border-radius:14px;max-width:720px;width:100%;overflow:hidden;border:1px solid rgba(74,180,100,.18);box-shadow:0 40px 100px rgba(0,0,0,.9),0 0 60px var(--glow);animation:slideUp .28s cubic-bezier(.34,1.56,.64,1);max-height:90vh;display:flex;flex-direction:column}
.modal-header{position:relative;height:220px;background:var(--bg);flex-shrink:0}
.modal-header img{width:100%;height:100%;object-fit:cover;opacity:.4;position:absolute;inset:0}
.modal-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--surface) 0%,transparent 55%)}
.modal-header-info{position:absolute;bottom:1rem;left:1.4rem;right:1.4rem}
.modal-body{padding:1.2rem 1.4rem;overflow-y:auto}
.season-btns{display:flex;gap:.4rem;flex-wrap:wrap}
.season-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:.28rem .65rem;border-radius:4px;cursor:pointer;font-size:.72rem;font-weight:600;font-family:'DM Sans',sans-serif}
.season-btn.active{background:var(--green);border-color:var(--green);color:#000}
.ep-list{display:flex;flex-direction:column;gap:.5rem}
.ep-item{display:flex;gap:.9rem;padding:.7rem;border-radius:8px;background:var(--card);border:1px solid var(--border);align-items:flex-start}
.ep-thumb{width:80px;height:50px;object-fit:cover;border-radius:4px;flex-shrink:0}
.ep-thumb-ph{width:80px;height:50px;border-radius:4px;background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:.7rem}
.ep-name{font-size:.8rem;color:var(--text);font-weight:600;margin-bottom:.18rem}
.ep-sum{font-size:.72rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ep-rt{font-size:.68rem;color:var(--faint);flex-shrink:0;padding-top:2px}
.ep-watch{background:var(--green);color:#000;border:none;padding:.28rem .7rem;border-radius:5px;cursor:pointer;font-size:.7rem;font-weight:700;flex-shrink:0;font-family:'DM Sans',sans-serif}
.spinner{width:40px;height:40px;border:3px solid rgba(74,180,100,.2);border-top-color:var(--green);border-radius:50%;animation:rotate .8s linear infinite}
.spinner-sm{width:28px;height:28px;border-width:2px}

/* player */
.player-overlay{position:fixed;inset:0;background:rgba(2,6,3,.95);z-index:1001;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(12px);animation:fadeIn .2s ease}
.player-box{background:var(--surface);border-radius:14px;max-width:820px;width:100%;overflow:hidden;border:1px solid rgba(74,180,100,.18);box-shadow:0 40px 100px rgba(0,0,0,.9),0 0 60px var(--glow);animation:slideUp .28s cubic-bezier(.34,1.56,.64,1)}
.source-picker{display:flex;gap:.6rem;padding:.7rem 1rem;background:rgba(0,0,0,.4);border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap}
.src-label{font-size:.65rem;letter-spacing:.12em;color:var(--faint);font-weight:700;margin-right:.2rem}
.src-btn{display:flex;align-items:center;gap:.4rem;padding:.38rem .85rem;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:.75rem;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s}
.src-btn:hover{border-color:rgba(74,180,100,.3);color:var(--text)}
.src-btn.active{background:rgba(74,180,100,.12);border-color:rgba(74,180,100,.45);color:var(--green)}
.src-dot{width:7px;height:7px;border-radius:50%;background:var(--faint);transition:all .2s;flex-shrink:0}
.src-btn.active .src-dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.player-vwrap{position:relative;background:#000;aspect-ratio:16/9}
.player-vwrap video{width:100%;height:100%;display:block}
.player-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8rem}
.player-info{padding:1rem 1.4rem 1.3rem}

/* API status */
#api-status-bar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(8,15,10,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);padding:.45rem 1.2rem;display:flex;align-items:center;gap:1rem;justify-content:space-between;font-size:.7rem;font-family:'DM Sans',sans-serif;transform:translateY(-100%);transition:transform .3s ease}
#api-status-bar.visible{transform:translateY(0)}
.api-pills{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:.35rem;padding:.22rem .6rem;border-radius:20px;font-size:.68rem;font-weight:600;border:1px solid transparent;transition:all .3s}
.pill.checking{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);color:var(--faint)}
.pill.ok{background:rgba(74,180,100,.1);border-color:rgba(74,180,100,.25);color:var(--green)}
.pill.error{background:rgba(255,80,80,.08);border-color:rgba(255,80,80,.2);color:rgba(255,100,100,.8)}
.pill.na{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);color:var(--faint)}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pdot.checking{background:var(--faint);animation:fadeIn 1s infinite alternate}
.pdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.pdot.error{background:rgba(255,100,100,.8)}
.pdot.na{background:var(--faint);opacity:.4}
#status-close{background:none;border:none;color:var(--faint);cursor:pointer;font-size:.85rem;padding:.1rem .4rem;font-family:'DM Sans',sans-serif}
#status-toggle{position:fixed;top:.55rem;right:1rem;z-index:201;background:rgba(8,15,10,.88);border:1px solid var(--border);color:var(--faint);font-size:.65rem;font-weight:600;padding:.28rem .65rem;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.04em;backdrop-filter:blur(10px);transition:all .2s;display:flex;align-items:center;gap:.3rem}
#status-toggle:hover{color:var(--text);border-color:rgba(74,180,100,.3)}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--faint);transition:all .3s;flex-shrink:0}
#status-toggle.ok .tdot{background:var(--green);box-shadow:0 0 5px var(--green)}
#status-toggle.error .tdot{background:rgba(255,100,100,.8)}

/* empty */
.empty{text-align:center;padding:4rem 0;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.8rem}
.empty-title{font-size:.9rem;margin-bottom:.3rem;font-weight:600}
.empty-sub{font-size:.8rem;color:var(--faint)}

/* h-row */
.h-row{display:flex;gap:.9rem;overflow-x:auto;padding-bottom:.5rem;scrollbar-width:none}
.h-card{flex-shrink:0;width:130px;position:relative}
.remove-btn{position:absolute;top:-6px;left:-6px;background:#1a1a1a;border:1px solid rgba(255,255,255,.1);color:var(--muted);width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:.6rem;display:flex;align-items:center;justify-content:center}

.screen-body{padding:1rem 2rem 5rem}
</style>
</head>
<body>

<!-- API STATUS BAR -->
<div id="api-status-bar">
  <div class="api-pills">
    <span style="font-size:.65rem;color:var(--faint);letter-spacing:.1em;font-weight:700;margin-right:.2rem">API</span>
    <div class="pill checking" id="pill-tvmaze"><div class="pdot checking" id="dot-tvmaze"></div><span>TVmaze</span></div>
    <div class="pill checking" id="pill-vidlink"><div class="pdot checking" id="dot-vidlink"></div><span>VidLink</span></div>
  </div>
  <button id="status-close" onclick="toggleStatusBar()">✕</button>
</div>
<button id="status-toggle" onclick="toggleStatusBar()">
  <span class="tdot" id="toggle-dot"></span> API Status
</button>

<!-- TV SHOWS SCREEN (HOME) -->
<div id="screen-shows" class="screen active">
  <div class="hero" style="height:320px">
    <div class="hero-bg" id="shows-hero-bg"><div class="hero-fallback"></div></div>
    <div class="hero-overlay" style="background:linear-gradient(to bottom,rgba(8,15,10,.2) 0%,rgba(8,15,10,.7) 65%,var(--bg) 100%)"></div>
    <div class="topbar">
      <div class="logo">🎞 Film Vault</div>
    </div>
    <div class="hero-content">
      <div class="hero-tag">TRENDING</div>
      <h1 id="shows-hero-title" class="hero-title" style="font-size:clamp(1.4rem,4vw,2.2rem)">Loading...</h1>
      <div id="shows-hero-genres" style="font-size:.75rem;color:var(--muted);margin-top:.3rem"></div>
    </div>
  </div>
  <div class="screen-body">
    <div id="shows-continue-section"></div>
    <div id="shows-wl-section"></div>
    <div class="sec-label" id="shows-label">POPULAR SHOWS</div>
    <div class="grid" id="shows-grid">
      <div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--faint)">
        <div class="spinner" style="margin:0 auto 1rem"></div>loading shows...
      </div>
    </div>
  </div>
</div>

<!-- SEARCH SCREEN -->
<div id="screen-search" class="screen">
  <div class="screen-body" style="padding-top:1.5rem">
    <div class="logo" style="margin-bottom:1.2rem">🔍 Search</div>
    <div class="search-wrap" style="margin-bottom:1.5rem">
      <span class="search-icon">🔍</span>
      <input id="search-input" class="search-input" type="text" placeholder="search any TV show..." autocomplete="off"/>
      <span class="search-spin" id="search-spin">⟳</span>
    </div>
    <div class="sec-label" id="search-label" style="display:none"></div>
    <div class="grid" id="search-grid"></div>
    <div id="search-empty" class="empty" style="display:none">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">no results found</div>
      <div class="empty-sub">try a different title</div>
    </div>
    <div id="search-hint" class="empty">
      <div class="empty-icon">📺</div>
      <div class="empty-title">search for a show</div>
      <div class="empty-sub">type a name above to find any TV show</div>
    </div>
  </div>
</div>

<!-- WATCH LATER SCREEN -->
<div id="screen-watchlater" class="screen">
  <div class="screen-body" style="padding-top:1.5rem">
    <div class="logo" style="margin-bottom:1.5rem">🔖 Watch Later</div>
    <div id="wl-content"></div>
  </div>
</div>

<!-- CONTINUE WATCHING SCREEN -->
<div id="screen-continue" class="screen">
  <div class="screen-body" style="padding-top:1.5rem">
    <div class="logo" style="margin-bottom:1.5rem">▶ Continue Watching</div>
    <div id="continue-content"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav id="bottom-nav">
  <button class="nav-btn active" data-tab="shows">
    <span class="nav-icon">📺</span><span class="nav-label">TV Shows</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" data-tab="search">
    <span class="nav-icon">🔍</span><span class="nav-label">Search</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" data-tab="watchlater">
    <span class="nav-icon">🔖</span><span class="nav-label">Saved</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" data-tab="continue">
    <span class="nav-icon">▶</span><span class="nav-label">Continue</span><div class="nav-dot"></div>
  </button>
</nav>

<!-- SHOW MODAL -->
<div id="show-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeShowModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header" id="modal-header">
      <div class="modal-grad"></div>
      <button class="btn-icon" style="position:absolute;top:.75rem;right:.75rem;z-index:10" onclick="closeShowModal()">✕</button>
      <div class="modal-header-info" id="modal-header-info"></div>
    </div>
    <div class="modal-body">
      <p id="modal-summary" style="color:var(--muted);font-size:.83rem;line-height:1.65;margin-bottom:1.2rem"></p>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">
        <button id="modal-wl-btn" class="btn-outline" onclick="toggleShowWL()">+ Watch Later</button>
        <div class="season-btns" id="season-btns"></div>
      </div>
      <div id="ep-loading" style="display:flex;justify-content:center;padding:2rem"><div class="spinner spinner-sm"></div></div>
      <div id="ep-list" class="ep-list"></div>
    </div>
  </div>
</div>

<!-- PLAYER MODAL -->
<div id="player-modal" class="player-overlay" style="display:none" onclick="if(event.target===this)closePlayer()">
  <div class="player-box" onclick="event.stopPropagation()">
    <div class="source-picker">
      <span class="src-label">SOURCE</span>
      <button class="src-btn active" id="src-vidlink" onclick="switchSource('vidlink')">
        <span class="src-dot"></span>🎬 VidLink
      </button>
      <button class="src-btn" id="src-vidsrc" onclick="switchSource('vidsrc')">
        <span class="src-dot"></span>📡 VidSrc
      </button>
    </div>
    <div class="player-vwrap" id="player-vwrap">
      <div class="player-center" id="player-loading">
        <div class="spinner"></div>
        <span style="color:var(--muted);font-size:.8rem">loading...</span>
      </div>
      <div class="player-center" id="player-error" style="display:none">
        <span style="font-size:2rem">📽️</span>
        <span style="color:var(--muted);font-size:.85rem;text-align:center;max-width:260px;line-height:1.5">couldn't load — try switching source above</span>
      </div>
      <button class="btn-icon" style="position:absolute;top:.75rem;right:.75rem;z-index:10" onclick="closePlayer()">✕</button>
    </div>
    <div class="player-info">
      <div id="player-title" style="font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:.25rem"></div>
      <div id="player-meta" style="font-size:.78rem;color:var(--muted)"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════
const TVMAZE = 'https://api.tvmaze.com';

const SOURCES = {
  vidlink: {
    movie: id => `https://vidlink.pro/movie/${id}`,
    tv:    (id,s,e) => `https://vidlink.pro/tv/${id}/${s}/${e}`,
  },
  vidsrc: {
    movie: id => `https://vidsrc.to/embed/movie/${id}`,
    tv:    (id,s,e) => `https://vidsrc.to/embed/tv/${id}/${s}/${e}`,
  },
};
let activeSource = 'vidlink';

const GRADS = [
  'linear-gradient(135deg,#0a1f0d,#081208)','linear-gradient(135deg,#0d1f12,#060e07)',
  'linear-gradient(135deg,#071a0a,#0a180c)','linear-gradient(135deg,#0e2210,#080f09)',
  'linear-gradient(135deg,#091a0b,#0c1a0e)','linear-gradient(135deg,#0b1f0d,#070d08)',
];

// ══════════════════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════════════════
function lsGet(k, fb) { try { const v = JSON.parse(localStorage.getItem(k)); return v !== null ? v : fb; } catch { return fb; } }
function lsSet(k, v)  { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

// ══════════════════════════════════════════════════════
//  STATE  (lsGet defined first — no crash)
// ══════════════════════════════════════════════════════
const state = {
  activeTab:      'shows',
  shows:          [],
  showCache:      {},
  epCache:        {},
  watchLater:     lsGet('fv_wl', []),
  continueWatch:  lsGet('fv_cw', []),
  progressMap:    lsGet('fv_pm', {}),
  currentShow:    null,
  episodes:       [],
  selectedSeason: 1,
  currentPlayer:  null,
  searchDebounce: null,
};

function saveWL()  { lsSet('fv_wl', state.watchLater); }
function saveCW()  { lsSet('fv_cw', state.continueWatch); }
function savePM()  { lsSet('fv_pm', state.progressMap); }

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
function starsHTML(r) {
  if (!r) return '';
  const f = Math.round(r / 2);
  return `<span class="stars">${'★'.repeat(f)}${'☆'.repeat(5-f)}</span><span class="stars-n">${Number(r).toFixed(1)}</span>`;
}

function ph(title, id) {
  const init = (title||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const bg = GRADS[Math.abs(id) % GRADS.length];
  return `<div class="ph" style="background:${bg};width:100%;height:100%">
    <div class="ph-glow"></div>
    <span class="ph-init">${init}</span>
    <span class="ph-name">${title||''}</span>
  </div>`;
}

function tvShow(d) {
  return {
    id:        String(d.id),
    name:      d.name || '',
    premiered: d.premiered || '',
    status:    d.status || '',
    genres:    d.genres || [],
    rating:    d.rating?.average || null,
    summary:   d.summary || '',
    image:     d.image || null,
    externals: d.externals || {},
    tvmaze_id: d.id,
  };
}

function wlSaved(id) { return state.watchLater.some(i => i.id === String(id)); }

// ══════════════════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════════════════
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

function switchTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById(`screen-${tab}`).classList.add('active');
  if (tab === 'watchlater') renderWL();
  if (tab === 'continue')   renderContinue();
}

// ══════════════════════════════════════════════════════
//  TV SHOWS — LOAD & RENDER
// ══════════════════════════════════════════════════════
async function loadShows() {
  try {
    const res  = await fetch(`${TVMAZE}/shows?page=0`);
    const data = await res.json();
    state.shows = data.slice(0, 20).map(tvShow);
    state.shows.forEach(s => { state.showCache[s.id] = s; });
    renderShows();
  } catch(e) { console.error('loadShows:', e); }
}

function renderShows() {
  // hero
  const f = state.shows[0];
  if (f) {
    document.getElementById('shows-hero-title').textContent = f.name;
    document.getElementById('shows-hero-genres').textContent = f.genres?.slice(0,3).join(' · ') || '';
    const bg = document.getElementById('shows-hero-bg');
    const src = f.image?.original || f.image?.medium;
    if (src) bg.innerHTML = `<img src="${src}" alt="">`;
  }
  document.getElementById('shows-label').textContent = `POPULAR SHOWS · ${state.shows.length}`;

  // continue watching row
  const cw = state.continueWatch.filter(i => i.type === 'show');
  const cwEl = document.getElementById('shows-continue-section');
  cwEl.innerHTML = cw.length ? `
    <div class="sec-label" style="margin-bottom:.75rem">CONTINUE WATCHING · ${cw.length}</div>
    <div class="h-row" style="margin-bottom:1.5rem">
      ${cw.map(s => `<div class="h-card">${showMiniCard(s)}<button class="remove-btn" onclick="removeCW('${s.id}')">✕</button></div>`).join('')}
    </div>` : '';

  // watch later row
  const wl = state.watchLater.filter(i => i.type === 'show').slice(0, 6);
  const wlEl = document.getElementById('shows-wl-section');
  wlEl.innerHTML = wl.length ? `
    <div class="sec-label" style="margin-bottom:.75rem">WATCH LATER · ${wl.length}</div>
    <div class="h-row" style="margin-bottom:1.5rem">
      ${wl.map(s => `<div class="h-card">${showMiniCard(s)}</div>`).join('')}
    </div>` : '';

  document.getElementById('shows-grid').innerHTML = state.shows.map(s => showCardHTML(s)).join('');
}

function showMiniCard(s) {
  const img = s.image?.medium || s.image?.original;
  return `<div class="card" onclick="openShowModal('${s.id}')">
    <div class="card-poster">${img ? `<img src="${img}" alt="${s.name}">` : ph(s.name, s.id)}</div>
    <div class="card-info"><div class="card-title">${s.name}</div></div>
  </div>`;
}

function showCardHTML(s) {
  const img = s.image?.medium || s.image?.original;
  const saved = wlSaved(s.id);
  const year  = s.premiered?.split('-')[0] || '';
  return `<div class="card" onclick="openShowModal('${s.id}')">
    <div class="card-poster">${img ? `<img src="${img}" alt="${s.name}">` : ph(s.name, s.id)}</div>
    <button class="wl-btn${saved?' saved':''}" onclick="event.stopPropagation();toggleWLById('${s.id}');renderShows()">${saved?'✓':'+'}</button>
    <div class="card-info">
      <div class="card-meta">${year}${s.genres?.[0]?' · '+s.genres[0]:''}</div>
      <div class="card-title">${s.name}</div>
      ${s.rating ? starsHTML(s.rating) : ''}
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════════════
const searchInput = document.getElementById('search-input');
const searchSpin  = document.getElementById('search-spin');

searchInput.addEventListener('input', e => {
  const q = e.target.value.trim();
  clearTimeout(state.searchDebounce);
  if (!q) {
    document.getElementById('search-grid').innerHTML = '';
    document.getElementById('search-label').style.display = 'none';
    document.getElementById('search-empty').style.display = 'none';
    document.getElementById('search-hint').style.display = '';
    return;
  }
  state.searchDebounce = setTimeout(() => searchShows(q), 350);
});

async function searchShows(q) {
  searchSpin.classList.add('on');
  document.getElementById('search-hint').style.display  = 'none';
  document.getElementById('search-empty').style.display = 'none';
  try {
    const res  = await fetch(`${TVMAZE}/search/shows?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    const shows = data.map(r => tvShow(r.show));
    shows.forEach(s => { state.showCache[s.id] = s; });
    const label = document.getElementById('search-label');
    if (shows.length) {
      label.textContent = `RESULTS · "${q.toUpperCase()}" · ${shows.length}`;
      label.style.display = '';
      document.getElementById('search-grid').innerHTML = shows.map(s => showCardHTML(s)).join('');
    } else {
      label.style.display = 'none';
      document.getElementById('search-grid').innerHTML = '';
      document.getElementById('search-empty').style.display = '';
    }
  } catch(e) { console.error('searchShows:', e); }
  searchSpin.classList.remove('on');
}

// ══════════════════════════════════════════════════════
//  WATCH LATER
// ══════════════════════════════════════════════════════
function toggleWLById(id) {
  id = String(id);
  const show = state.showCache[id] || state.shows.find(s => s.id === id);
  if (!show) return;
  const idx = state.watchLater.findIndex(i => i.id === id && i.type === 'show');
  if (idx > -1) state.watchLater.splice(idx, 1);
  else state.watchLater.unshift({ ...show, type: 'show' });
  saveWL();
}

function toggleShowWL() {
  const s = state.currentShow;
  if (!s) return;
  toggleWLById(s.id);
  updateModalWLBtn();
}

function updateModalWLBtn() {
  const s = state.currentShow;
  if (!s) return;
  const saved = wlSaved(s.id);
  const btn = document.getElementById('modal-wl-btn');
  btn.textContent = saved ? '✓ Saved' : '+ Watch Later';
  btn.className = 'btn-outline' + (saved ? ' saved' : '');
}

function renderWL() {
  const shows = state.watchLater.filter(i => i.type === 'show');
  const el = document.getElementById('wl-content');
  if (!shows.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔖</div><div class="empty-title">nothing saved yet</div><div class="empty-sub">hit + on any show to save it here</div></div>`;
    return;
  }
  el.innerHTML = `<div class="sec-label">SAVED · ${shows.length} shows</div>
    <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:.75rem">
      <button onclick="state.watchLater=[];saveWL();renderWL()" style="background:none;border:none;color:var(--faint);font-size:.72rem;cursor:pointer;font-family:'DM Sans',sans-serif">clear all</button>
    </div>
    <div class="grid">${shows.map(s => showCardHTML(s)).join('')}</div>`;
}

// ══════════════════════════════════════════════════════
//  CONTINUE WATCHING
// ══════════════════════════════════════════════════════
function addToCW(show) {
  const id = String(show.id);
  const exists = state.continueWatch.find(i => i.id === id && i.type === 'show');
  if (!exists) {
    state.continueWatch.unshift({ ...show, type: 'show' });
    state.continueWatch = state.continueWatch.slice(0, 10);
    saveCW();
  }
}

function removeCW(id) {
  id = String(id);
  state.continueWatch = state.continueWatch.filter(i => !(i.id === id && i.type === 'show'));
  saveCW();
  renderShows();
}

function renderContinue() {
  const shows = state.continueWatch.filter(i => i.type === 'show');
  const el = document.getElementById('continue-content');
  if (!shows.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">▶️</div><div class="empty-title">nothing in progress</div><div class="empty-sub">start watching a show and it'll appear here</div></div>`;
    return;
  }
  shows.forEach(s => { state.showCache[s.id] = s; });
  el.innerHTML = `<div class="sec-label">IN PROGRESS · ${shows.length}</div>
    <div class="grid">${shows.map(s => `
      <div style="position:relative">
        ${showCardHTML(s)}
        <button class="remove-btn" onclick="removeCW('${s.id}')">✕</button>
      </div>`).join('')}
    </div>`;
}

// ══════════════════════════════════════════════════════
//  SHOW MODAL
// ══════════════════════════════════════════════════════
async function openShowModal(id) {
  id = String(id);
  const show = state.showCache[id] || state.shows.find(s => s.id === id) || state.watchLater.find(i => i.id === id);
  if (!show) return;
  state.currentShow = show;
  state.episodes    = [];

  const modal  = document.getElementById('show-modal');
  const header = document.getElementById('modal-header');
  const img    = show.image?.original || show.image?.medium;

  // clear old img/ph
  header.querySelectorAll('img,.ph').forEach(el => el.remove());
  if (img) {
    const i = Object.assign(document.createElement('img'), { src: img });
    i.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.4';
    header.prepend(i);
  } else {
    const d = document.createElement('div');
    d.style.cssText = 'position:absolute;inset:0';
    d.innerHTML = ph(show.name, show.id);
    header.prepend(d);
  }

  document.getElementById('modal-header-info').innerHTML = `
    <h2 style="color:var(--text);margin:0 0 .2rem;font-size:1.5rem;font-weight:800">${show.name}</h2>
    <div style="display:flex;align-items:center;gap:.8rem;flex-wrap:wrap">
      <span style="color:var(--muted);font-size:.78rem">${show.premiered?.split('-')[0]||''}${show.genres?.[0]?' · '+show.genres[0]:''}${show.status?' · '+show.status:''}</span>
      ${show.rating ? starsHTML(show.rating) : ''}
    </div>`;

  document.getElementById('modal-summary').textContent = show.summary.replace(/<[^>]*>/g,'');
  updateModalWLBtn();

  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';

  // fetch episodes
  document.getElementById('ep-loading').style.display = 'flex';
  document.getElementById('ep-list').innerHTML = '';
  document.getElementById('season-btns').innerHTML = '';
  try {
    const res  = await fetch(`${TVMAZE}/shows/${show.tvmaze_id}/episodes`);
    const eps  = await res.json();
    state.episodes = eps.map(ep => ({
      id:      ep.id,
      name:    ep.name || '',
      number:  ep.number,
      season:  ep.season,
      airdate: ep.airdate || '',
      runtime: ep.runtime || null,
      summary: ep.summary ? ep.summary.replace(/<[^>]*>/g,'') : '',
      image:   ep.image || null,
    }));
    const seasons = [...new Set(state.episodes.map(e => e.season))].sort((a,b)=>a-b);
    state.selectedSeason = seasons[0] || 1;
    document.getElementById('season-btns').innerHTML = seasons.map(s =>
      `<button class="season-btn${s===state.selectedSeason?' active':''}" onclick="selectSeason(${s})">S${s}</button>`
    ).join('');
    renderEpisodes();
  } catch(e) { console.error('episodes:', e); }
  document.getElementById('ep-loading').style.display = 'none';

  // add to continue watching
  addToCW(show);
}

function closeShowModal() {
  document.getElementById('show-modal').style.display = 'none';
  document.body.style.overflow = '';
  state.currentShow = null;
}

function selectSeason(s) {
  state.selectedSeason = s;
  document.querySelectorAll('.season-btn').forEach(b => b.classList.toggle('active', +b.textContent.slice(1) === s));
  renderEpisodes();
}

function renderEpisodes() {
  const show     = state.currentShow;
  const filtered = state.episodes.filter(e => e.season === state.selectedSeason);

  // store in epCache
  filtered.forEach(ep => {
    const key = `${show?.id}-s${ep.season}e${ep.number}`;
    state.epCache[key] = {
      key,
      title:    `${show?.name||''} — S${ep.season} E${ep.number}: ${ep.name}`,
      overview: ep.summary,
      imdb_id:  show?.externals?.imdb || null,
      season:   ep.season,
      episode:  ep.number,
      is_ep:    true,
    };
  });

  document.getElementById('ep-list').innerHTML = filtered.map(ep => {
    const key   = `${show?.id}-s${ep.season}e${ep.number}`;
    const thumb = ep.image?.medium
      ? `<img class="ep-thumb" src="${ep.image.medium}" alt="">`
      : `<div class="ep-thumb-ph">E${ep.number}</div>`;
    return `<div class="ep-item">
      ${thumb}
      <div style="flex:1;min-width:0">
        <div class="ep-name">E${ep.number} — ${ep.name}</div>
        ${ep.summary ? `<div class="ep-sum">${ep.summary}</div>` : ''}
        ${ep.airdate ? `<div style="font-size:.65rem;color:var(--faint);margin-top:.2rem">${ep.airdate}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.35rem;flex-shrink:0">
        ${ep.runtime ? `<div class="ep-rt">${ep.runtime}m</div>` : ''}
        <button class="ep-watch" onclick="openEpByKey('${key}')">▶ Watch</button>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
//  PLAYER
// ══════════════════════════════════════════════════════
function switchSource(src) {
  activeSource = src;
  document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`src-${src}`)?.classList.add('active');
  if (state.currentPlayer) loadInPlayer(state.currentPlayer);
}

function injectIframe(url) {
  document.getElementById('player-iframe')?.remove();
  const wrap   = document.getElementById('player-vwrap');
  const iframe = document.createElement('iframe');
  iframe.id    = 'player-iframe';
  iframe.src   = url;
  iframe.setAttribute('allowfullscreen','');
  iframe.setAttribute('allow','autoplay; fullscreen; encrypted-media');
  iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
  wrap.appendChild(iframe);
}

function loadInPlayer(item) {
  document.getElementById('player-loading').style.display = 'flex';
  document.getElementById('player-error').style.display   = 'none';
  document.getElementById('player-iframe')?.remove();

  const src    = SOURCES[activeSource];
  const imdbId = item.imdb_id;

  if (!src) { showPlayerError(); return; }

  setTimeout(() => {
    document.getElementById('player-loading').style.display = 'none';
    if (imdbId) {
      const url = item.is_ep
        ? src.tv(imdbId, item.season, item.episode)
        : src.movie(imdbId);
      injectIframe(url);
    } else {
      showPlayerError();
    }
  }, 300);
}

function showPlayerError() {
  document.getElementById('player-loading').style.display = 'none';
  document.getElementById('player-error').style.display   = 'flex';
}

function openEpByKey(key) {
  const ep = state.epCache[key];
  if (!ep) return;
  state.currentPlayer = ep;

  document.getElementById('player-title').textContent = ep.title;
  document.getElementById('player-meta').textContent  = ep.overview || '';
  document.getElementById('player-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';

  document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`src-${activeSource}`)?.classList.add('active');

  loadInPlayer(ep);
}

function closePlayer() {
  document.getElementById('player-iframe')?.remove();
  document.getElementById('player-modal').style.display = 'none';
  document.body.style.overflow = '';
  state.currentPlayer = null;
}

// ══════════════════════════════════════════════════════
//  API STATUS
// ══════════════════════════════════════════════════════
let statusVisible = false;

function toggleStatusBar() {
  statusVisible = !statusVisible;
  document.getElementById('api-status-bar').classList.toggle('visible', statusVisible);
}

function setPill(name, status) {
  const pill = document.getElementById(`pill-${name}`);
  const dot  = document.getElementById(`dot-${name}`);
  if (!pill || !dot) return;
  pill.className = `pill ${status}`;
  dot.className  = `pdot ${status}`;
  updateToggleDot();
}

function updateToggleDot() {
  const names  = ['tvmaze','vidlink'];
  const states = names.map(n => document.getElementById(`pill-${n}`)?.className || '');
  const hasErr = states.some(s => s.includes('error'));
  const allOk  = states.every(s => s.includes('ok'));
  const tog    = document.getElementById('status-toggle');
  const dot    = document.getElementById('toggle-dot');
  if (!tog || !dot) return;
  tog.className = hasErr ? 'error' : allOk ? 'ok' : '';
}

async function checkTVmaze() {
  setPill('tvmaze', 'checking');
  try {
    const r = await fetch('https://api.tvmaze.com/shows/1', { signal: AbortSignal.timeout(5000) });
    setPill('tvmaze', r.ok ? 'ok' : 'error');
  } catch { setPill('tvmaze', 'error'); }
}

async function checkVidlink() {
  setPill('vidlink', 'checking');
  try {
    const r = await fetch('https://vidlink.pro', { mode: 'no-cors', signal: AbortSignal.timeout(5000) });
    setPill('vidlink', 'ok');
  } catch { setPill('vidlink', 'error'); }
}

// Escape key
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (document.getElementById('player-modal').style.display !== 'none') closePlayer();
  else if (document.getElementById('show-modal').style.display !== 'none') closeShowModal();
});

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
loadShows();
setTimeout(() => { checkTVmaze(); checkVidlink(); }, 1200);
</script>
</body>
</html>
